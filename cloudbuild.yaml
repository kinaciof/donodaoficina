steps:
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  - name: 'ghcr.io/w9jds/firebase-action:latest'
    entrypoint: firebase
    args: ['deploy', '--project', 'donodaoficina', '--only', 'hosting']

options:
  logging: CLOUD_LOGGING_ONLY
