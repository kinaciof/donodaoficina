steps:
  # 1. Instalar dependências
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # 2. Gerar o build estático do Next.js
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # 3. Deploy para o Firebase Hosting (usando endereço direto da imagem)
  - name: 'docker.io/firebase/firebase-tools:latest'
    entrypoint: firebase
    args: ['deploy', '--project', 'donodaoficina', '--only', 'hosting']

options:
  logging: CLOUD_LOGGING_ONLY
